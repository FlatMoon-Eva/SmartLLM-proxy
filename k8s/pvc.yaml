apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-logs-pvc
  namespace: smartllm
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: smartllm
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
